name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    name: Syntax check & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (all JS files)
        run: |
          for f in index.js providers/*.js lib/*.js; do
            echo "Checking $f..."
            node --input-type=module < "$f" --check 2>/dev/null || node --check "$f"
          done

      - name: Verify no .env committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env file is committed! Remove it immediately."
            exit 1
          fi
          echo ".env is not tracked — OK"

      - name: Verify required files exist
        run: |
          for f in index.js package.json .env.example .gitignore README.md LICENSE; do
            test -f "$f" && echo "✅ $f" || (echo "❌ Missing: $f" && exit 1)
          done
